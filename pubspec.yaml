name: medi_reminder
description: "My Medicine Reminder app for offline medication tracking."
publish_to: 'none'
version: 1.0.0+4

environment:
  sdk: ^3.11.0

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8
  sqflite: ^2.2.8+2
  path: ^1.8.4
  path_provider: ^2.0.15
  provider: ^6.0.9
  intl: ^0.18.1
  flutter_local_notifications: ^17.1.1
  flutter_launcher_icons: ^0.13.1
  image_picker: ^0.8.7+5
  timezone: ^0.9.4
  google_mlkit_text_recognition: ^0.15.1
  change_app_package_name: ^1.5.0
  shared_preferences: ^2.5.5

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^2.0.0
flutter_native_splash:
    image: assets/images/icon.png
    color: ffffff
flutter_icons:
  android: "launcher_icon"
  ios: true
  image_path: "assets/images/icon.png"
  min_sdk_android: 21 # android min sdk min:16, default 21
  web:
    generate: true
    image_path: "assets/images/icon.png"
    background_color: "#hexcode"
    theme_color: "#hexcode"
  windows:
    generate: true
    image_path: "assets/images/icon.png"
    icon_size: 48 # min:48, max:256, default: 48
  macos:
    generate: true
    image_path: "assets/images/icon.png"

flutter:
  uses-material-design: true
  assets:
    - assets/images/
    - assets/icon/

